<!-- BurntBrotta Hero Section -->
<div class="row align-items-center mb-5 mt-3 hero-section">
  <!-- Left Column: Typography -->
  <div class="col-lg-6 mb-4 mb-lg-0">
    <div class="hero-text pe-lg-4">
      <div class="decorative-dot mb-3"></div>
      <h1 class="display-4 fw-bolder hero-title text-secondary lh-1 mb-3">
        Kitchen Disasters<br>Turned Delicious:
      </h1>
      <p class="fs-4 text-muted mb-4">The Chronicles of Burnt Brotta!</p>
      
      <div class="search-box position-relative mt-5 shadow-sm rounded-pill overflow-hidden border border-primary border-opacity-25 bg-white">
        <div class="input-group input-group-lg">
          <span class="input-group-text bg-transparent border-0 text-primary ps-4">
            <i class="bi bi-search"></i>
          </span>
          <input type="text" class="form-control border-0 bg-transparent shadow-none px-3 py-3 fs-5" 
                 placeholder="Search restaurants by name or area..." 
                 (input)="onSearch($event)">
          <button class="btn btn-primary px-4 fw-bold rounded-pill m-1" type="button">Find Food</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Right Column: Illustration (Mimicking Reference Image SVG style) -->
  <div class="col-lg-6 d-none d-lg-block text-end">
    <!-- Inline recreation of the BurntBrotta vector characters mixing ingredients -->
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="auto" style="max-height: 480px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.05));">
      <defs>
        <!-- Background blob -->
        <path id="blob" d="M 650,250 C 700,100 800,150 780,300 C 750,450 650,600 500,550 C 350,500 200,550 150,450 C 100,350 200,200 350,150 C 500,100 600,400 650,250 Z" />
        <linearGradient id="blobGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#fdcda2" stop-opacity="0.8" />
          <stop offset="100%" stop-color="#fdf4ec" stop-opacity="0.2" />
        </linearGradient>
      </defs>
      
      <!-- Background Shape -->
      <use href="#blob" fill="url(#blobGrad)" />

      <!-- Left Character (Chef) -->
      <g id="chef_left" transform="translate(150, 150)">
        <!-- Body/Apron -->
        <path d="M50,150 Q10,250 20,400 L180,400 Q190,250 150,150 Z" fill="#eb883b" />
        <!-- Head -->
        <circle cx="100" cy="100" r="45" fill="#ffd1b3" />
        <!-- Hair -->
        <path d="M50,80 Q100,20 150,80 Q130,50 100,40 Q70,50 50,80 Z" fill="#4a3b32" />
        <!-- Hat -->
        <path d="M60,60 Q100,-20 140,60 Q100,50 60,60 Z" fill="#ffffff" stroke="#e0e0e0" stroke-width="2" />
        <!-- Face Features -->
        <circle cx="85" cy="100" r="4" fill="#333" />
        <circle cx="115" cy="100" r="4" fill="#333" />
        <path d="M90,120 Q100,135 110,120" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" />
        <!-- Arms stirring -->
        <path d="M55,165 Q10,240 80,300" fill="none" stroke="#ffd1b3" stroke-width="18" stroke-linecap="round" />
        <path d="M145,165 Q190,240 120,300" fill="none" stroke="#ffd1b3" stroke-width="18" stroke-linecap="round" />
      </g>

      <!-- Right Character (Mixing) -->
      <g id="chef_right" transform="translate(420, 180)">
        <!-- Body -->
        <path d="M60,120 Q20,220 30,370 L170,370 Q180,220 140,120 Z" fill="#586e7a" />
        <!-- Apron element -->
        <path d="M70,160 L130,160 L140,370 L60,370 Z" fill="#ffffff" opacity="0.9" />
        <!-- Head -->
        <circle cx="100" cy="80" r="40" fill="#f5c7a9" />
        <!-- Hair -->
        <path d="M55,60 Q100,0 145,60 Q145,120 120,130 Q100,140 100,80 Q70,90 55,60 Z" fill="#2d241f" />
        <!-- Face Features -->
        <circle cx="85" cy="85" r="3" fill="#333" />
        <circle cx="105" cy="85" r="3" fill="#333" />
        <circle cx="115" cy="85" r="3" fill="#333" /> <!-- glasses frame -->
        <circle cx="85" cy="85" r="8" fill="none" stroke="#586e7a" stroke-width="1.5" />
        <circle cx="110" cy="85" r="8" fill="none" stroke="#586e7a" stroke-width="1.5" />
        <path d="M93,85 L102,85" stroke="#586e7a" stroke-width="1.5" />
        <path d="M90,105 Q100,115 110,105" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" />
        <!-- Arms -->
        <path d="M65,135 Q10,210 70,270" fill="none" stroke="#f5c7a9" stroke-width="16" stroke-linecap="round" />
      </g>

      <!-- Kitchen Elements (Table and Pots) -->
      <g id="kitchen_props">
        <!-- Table -->
        <rect x="100" y="450" width="550" height="20" fill="#a07c5a" rx="5" />
        <rect x="150" y="470" width="20" height="100" fill="#8b6546" />
        <rect x="580" y="470" width="20" height="100" fill="#8b6546" />
        
        <!-- Big Pot (Left) -->
        <path d="M220,450 L200,350 Q250,340 300,350 L280,450 Z" fill="#6ba7a8" />
        <rect x="190" y="340" width="120" height="10" fill="#528384" rx="3" />
        <!-- Pot handle -->
        <path d="M190,360 Q160,370 190,390" fill="none" stroke="#528384" stroke-width="6" stroke-linecap="round" />
        <path d="M310,360 Q340,370 310,390" fill="none" stroke="#528384" stroke-width="6" stroke-linecap="round" />
        
        <!-- Mixing Bowl (Right) -->
        <path d="M470,390 Q520,460 570,390 Z" fill="#ffffff" stroke="#e0e0e0" stroke-width="3" />
        
        <!-- Spoon -->
        <path d="M520,310 L495,400" stroke="#d5b481" stroke-width="6" stroke-linecap="round" />
        <ellipse cx="493" cy="405" rx="10" ry="15" fill="#d5b481" transform="rotate(-20 493 405)" />

        <!-- Floating Ingredients/Spices -->
        <circle cx="250" cy="280" r="6" fill="#8bb381" opacity="0.8" />
        <circle cx="280" cy="250" r="4" fill="#e2a76f" opacity="0.8" />
        <circle cx="210" cy="300" r="5" fill="#d96c6c" opacity="0.8" />
        
        <!-- Steam -->
        <path d="M230,320 Q250,280 230,240 T240,180" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.5" />
        <path d="M270,330 Q290,290 270,250 T280,200" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.6" />
      </g>
    </svg>
  </div>
</div>

<div class="row mb-4 mt-5">
  <div class="col-12 text-center">
    <h2 class="fw-bold border-bottom border-primary border-3 pb-2 d-inline-block">Popular Recipes & Places</h2>
    <p class="text-muted mt-2 fs-5">We put recipes to the test, so you can savor the success!</p>
  </div>
</div>

<div *ngIf="isLoading">
  <app-loader></app-loader>
</div>

<div *ngIf="!isLoading && filteredRestaurants.length === 0" class="text-center py-5">
  <i class="bi bi-shop text-muted" style="font-size: 4rem;"></i>
  <h4 class="mt-3">No restaurants found</h4>
  <p class="text-muted">Try a different search term.</p>
</div>

<div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" *ngIf="!isLoading && filteredRestaurants.length > 0">
  <div class="col" *ngFor="let restaurant of filteredRestaurants">
    <app-restaurant-card [restaurant]="restaurant"></app-restaurant-card>
  </div>
</div>
